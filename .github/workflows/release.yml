name: Release

# Builds HypeMuzik installers for Windows, macOS, and Linux.
#
# - Push a version tag (e.g. `v0.1.0`) → builds all three platforms and uploads
#   the installers to a DRAFT GitHub Release for that tag.
# - Run manually (workflow_dispatch) → builds all three and uploads the
#   installers as downloadable workflow artifacts (no release).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal macOS (Intel + Apple Silicon) → .app + .dmg
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          # Linux → .deb, .rpm, .AppImage
          # 24.04 (not 22.04): the native PipeWire system-EQ backend needs a
          # libpipewire-0.3-dev new enough for the `pipewire` crate, which 22.04's
          # 0.3.48 is not. This raises the built binary's glibc floor to 2.39 —
          # acceptable since PipeWire-era users run modern distros anyway.
          - platform: ubuntu-24.04
            args: ""
            rust-targets: ""
          # Windows → .msi (WiX) + .exe (NSIS)
          # Pinned to 2022: the cmake-rs crate (v0.1.58, via projectm-sys) only
          # knows the "Visual Studio 17 2022" generator, but windows-latest now
          # ships VS 18 — so the sidecar's CMake configure fails to find VS.
          # windows-2022 has the matching toolchain (same pin as ci.yml).
          - platform: windows-2022
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            pkg-config \
            build-essential \
            file

      # The visualizer sidecar (built by beforeBuildCommand → build-sidecar.mjs)
      # compiles libprojectM, whose Windows CMake requires GLEW (find_package(GLEW
      # REQUIRED)). Without it the sidecar build fails and no installer is produced.
      # Same static-md triplet as ci.yml's milkdrop job so it links into the DLL.
      - name: Install Windows build dependencies (GLEW for libprojectM)
        if: matrix.platform == 'windows-2022'
        run: vcpkg --triplet=x64-windows-static-md install glew

      - name: Setup pnpm
        # Version comes from the "packageManager" field in package.json.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          # The Cargo workspace (and its target dir) is at the repo root.
          workspaces: ". -> target"
          key: ${{ matrix.platform }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # NOTE: the APO DLL (Windows) is built + staged automatically by
      # beforeBuildCommand → build-sidecar.mjs, so no CI-only step is needed.

      - name: Build app + bundle installers
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (optional — add as repo secrets to
          # produce a Gatekeeper-friendly DMG; otherwise the build is unsigned).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater signing. Without these the build still succeeds but the
          # updater artifacts are UNSIGNED, and an unsigned update is rejected on
          # every user's machine — so the verify step below fails the release if
          # the manifest turns up unsigned, rather than shipping a dead updater.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # On a tag push: create/append a release named after the tag. It is
          # published, NOT draft — the updater cannot see a draft release, so a
          # draft would silently ship no updates at all. `latest.json` is
          # generated and uploaded by tauri-action (uploadUpdaterJson defaults
          # true), and `/releases/latest/download/latest.json` — the first
          # endpoint in tauri.conf.json — only resolves to a published release.
          # On manual runs: tagName is empty, so no release is created.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "HypeMuzik ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # A signing-key mismatch is only a build-time WARNING in the Tauri bundler,
      # never an error — a wrong or absent key produces artifacts that fail on
      # every user machine while CI stays green. This makes it a hard failure.
      # `tauri-action` echoes the bundler's stderr, so the warning, if present,
      # is in this job's log; we re-run the check against the produced manifest.
      - name: Verify updater artifacts are signed
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          # Every updater bundle drops a `.sig` next to it. No .sig ⇒ the updater
          # artifact was built unsigned (missing key, or --no-sign), which the
          # bundler only warns about.
          sigs="$(find target -path '*/bundle/*' -name '*.sig' 2>/dev/null | wc -l | tr -d ' ')"
          if [ "$sigs" = "0" ]; then
            echo "::error::No .sig files found — updater artifacts are unsigned. \
          Set TAURI_SIGNING_PRIVATE_KEY / _PASSWORD as repo secrets. An unsigned \
          update is rejected on every user's machine."
            exit 1
          fi
          echo "Found $sigs signed updater artifact(s)."

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hypemuzik-${{ matrix.platform }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.app
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/*/release/bundle/**/*.dmg
            target/*/release/bundle/**/*.app
            target/*/release/bundle/**/*.deb
            target/*/release/bundle/**/*.rpm
            target/*/release/bundle/**/*.AppImage
            target/*/release/bundle/**/*.msi
            target/*/release/bundle/**/*.exe

  # Tauri's bundler has no Snap target, so build one separately by repackaging
  # the Linux .deb the build job produced (no recompile) via snapcraft, then
  # attach the .snap to the release. Manual (workflow_dispatch) runs still get a
  # downloadable .snap artifact even though there's no release to attach to.
  snap:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download the Linux build artifacts (.deb)
        uses: actions/download-artifact@v4
        with:
          name: hypemuzik-ubuntu-24.04
          path: linux-build

      - name: Stage the .deb and stamp the snap version
        run: |
          deb="$(find linux-build -name '*.deb' | head -1)"
          if [ -z "$deb" ]; then
            echo "::error::no .deb found in the Linux build artifacts"
            exit 1
          fi
          cp "$deb" app.deb
          ver="$(jq -r .version src-tauri/tauri.conf.json)"
          sed -i "s/^version:.*/version: '$ver'/" snap/snapcraft.yaml
          echo "Building snap $ver from $(basename "$deb")"

      - name: Build the snap
        id: snap
        uses: snapcore/action-build@v1

      - name: Upload the .snap as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lw-ziki-amp
          if-no-files-found: error
          retention-days: 14
          path: ${{ steps.snap.outputs.snap }}

      - name: Attach the .snap to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          # NOT draft. The build job publishes this release so the updater can
          # see it; re-attaching as a draft would flip it back and silently break
          # updates. `softprops/action-gh-release` leaves a published release
          # published when draft is false.
          draft: false
          files: ${{ steps.snap.outputs.snap }}

  # The updater's manifest must carry a key for every platform we ship, or that
  # platform's users are told "no update available" forever. A universal macOS
  # build in particular needs BOTH darwin-aarch64 and darwin-x86_64 — there is
  # no darwin-universal key. This is the check that catches a manifest that built
  # fine but is missing a platform.
  verify-manifest:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - name: Fetch the published manifest
        run: |
          set -euo pipefail
          # The release is published by now; pull the manifest the updater will.
          url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/latest.json"
          echo "Fetching $url"
          for attempt in 1 2 3 4 5; do
            if curl -fsSL "$url" -o latest.json; then break; fi
            echo "attempt $attempt failed; the release asset may still be propagating"
            sleep 15
          done
          test -s latest.json || { echo "::error::could not fetch latest.json"; exit 1; }
          cat latest.json

      - name: Assert every shipped platform is present
        run: |
          set -euo pipefail
          required="darwin-aarch64 darwin-x86_64 windows-x86_64 linux-x86_64"
          missing=""
          for key in $required; do
            if ! jq -e --arg k "$key" '.platforms[$k].signature // empty | length > 0' latest.json >/dev/null; then
              missing="$missing $key"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::latest.json is missing signed entries for:$missing"
            echo "A missing platform means those users never see updates."
            exit 1
          fi
          echo "All required platforms present and signed."

  # Mirror the release to CrabNebula, the CDN fallback (the second updater
  # endpoint). Skipped cleanly when its secrets are absent — updates still work
  # entirely through GitHub, which is the primary endpoint and the durable
  # archive. This runs only once the manifest has been verified.
  publish-crabnebula:
    needs: verify-manifest
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      # The secret guard is inside the shell, not in an `if:` expression: the
      # `secrets` context is not available in workflow `if:` conditionals, so an
      # `if: secrets.CN_API_KEY != ''` silently evaluates to false and the step
      # never runs even when the secret is set. Reading it into an env and
      # testing it here is the pattern that actually works.
      - name: Publish to CrabNebula (skipped if not configured)
        shell: bash
        env:
          CN_API_KEY: ${{ secrets.CN_API_KEY }}
          CN_APP_SLUG: ${{ secrets.CN_APP_SLUG }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${CN_API_KEY:-}" ] || [ -z "${CN_APP_SLUG:-}" ]; then
            echo "CN_API_KEY / CN_APP_SLUG not set — skipping the CDN mirror. Updates work via GitHub."
            exit 0
          fi
          # `cn` pulls the assets straight from the GitHub Release we just
          # published, so there is nothing to re-upload here.
          curl -fsSL https://cdn.crabnebula.app/cn/latest/cn-linux-x86_64 -o cn
          chmod +x cn
          ./cn release draft "$CN_APP_SLUG" "${VERSION#v}" --framework tauri
          ./cn release upload "$CN_APP_SLUG" "${VERSION#v}" \
            --github-release "${{ github.repository }}@${VERSION}"
          ./cn release publish "$CN_APP_SLUG" "${VERSION#v}"
