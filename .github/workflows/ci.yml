name: CI

# Fast per-push compile + lint of the Rust crates on all three platforms.
# This is how the cfg-gated platform code (macOS Core Audio, Windows WASAPI,
# Linux PulseAudio) gets verified without cutting a release. The tauri binary
# crate (`hypemuzik`) is excluded so the frontend build isn't required here.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Windows runners intermittently fail crate downloads with "[16] Error in the
# HTTP2 framing layer" — force cargo onto HTTP/1.1 and retry transient fetches.
# CMAKE_POLICY_VERSION_MINIMUM lets CMake 4 build SDL2's old CMakeLists (it
# dropped compat with cmake_minimum_required < 3.5); harmless for projectM.
env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux audio/UI dev headers
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libwebkit2gtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.os }}-ci

      - name: Clippy (libs, excluding the tauri binary)
        run: cargo clippy --workspace --exclude hypemuzik --all-targets

  # Validates the OPTIONAL native MilkDrop (libprojectM) build on all three
  # platforms before the renderer is wired in. The `milkdrop` feature compiles
  # libprojectM v4 from source via CMake (statically). Kept in a separate job so
  # the native toolchain (CMake / OpenGL / GLEW / vcpkg) is only needed here —
  # default builds leave the feature off and never touch it. Built in RELEASE so
  # libprojectM's debug postfix matches projectm-sys's link name (the dev profile
  # optimizes deps, which otherwise produces a `libprojectM-4.a` vs `-4d` mismatch).
  milkdrop:
    strategy:
      fail-fast: false
      matrix:
        # Pin Windows to 2022: the cmake-rs crate (v0.1.58, via projectm-sys)
        # only knows the "Visual Studio 17 2022" generator, while windows-latest
        # now ships VS 18. windows-2022 has the matching toolchain.
        os: [macos-latest, windows-2022, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # libprojectM (GL/GLEW/GLM) + SDL2-from-source (X11 video backend) deps.
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgl1-mesa-dev mesa-common-dev libglm-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake glew

      - name: Install build deps (Windows)
        if: runner.os == 'Windows'
        run: vcpkg --triplet=x64-windows-static-md install glew

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.os }}-milkdrop

      # Builds libprojectM + SDL2 (from source) and links the sidecar binary.
      - name: Build the visualizer sidecar
        run: cargo build --release -p hm-visualizer --features milkdrop
