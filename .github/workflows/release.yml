name: Release

# Builds HypeMuzik installers for Windows, macOS, and Linux.
#
# - Push a version tag (e.g. `v0.1.0`) → builds all three platforms and uploads
#   the installers to a DRAFT GitHub Release for that tag.
# - Run manually (workflow_dispatch) → builds all three and uploads the
#   installers as downloadable workflow artifacts (no release).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal macOS (Intel + Apple Silicon) → .app + .dmg
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          # Linux → .deb, .rpm, .AppImage
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          # Windows → .msi (WiX) + .exe (NSIS)
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libasound2-dev \
            build-essential \
            file

      - name: Setup pnpm
        # Version comes from the "packageManager" field in package.json.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          # The Cargo workspace (and its target dir) is at the repo root.
          workspaces: ". -> target"
          key: ${{ matrix.platform }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app + bundle installers
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (optional — add as repo secrets to
          # produce a Gatekeeper-friendly DMG; otherwise the build is unsigned).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # On a tag push: create/append a draft release named after the tag.
          # On manual runs: tagName is empty, so no release is created.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "HypeMuzik ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hypemuzik-${{ matrix.platform }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.app
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/*/release/bundle/**/*.dmg
            target/*/release/bundle/**/*.app
            target/*/release/bundle/**/*.deb
            target/*/release/bundle/**/*.rpm
            target/*/release/bundle/**/*.AppImage
            target/*/release/bundle/**/*.msi
            target/*/release/bundle/**/*.exe
