name: Release

# Builds HypeMuzik installers for Windows, macOS, and Linux.
#
# - Push a version tag (e.g. `v0.1.0`) → builds all three platforms and uploads
#   the installers to a DRAFT GitHub Release for that tag.
# - Run manually (workflow_dispatch) → builds all three and uploads the
#   installers as downloadable workflow artifacts (no release).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal macOS (Intel + Apple Silicon) → .app + .dmg
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          # Linux → .deb, .rpm, .AppImage
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          # Windows → .msi (WiX) + .exe (NSIS)
          # Pinned to 2022: the cmake-rs crate (v0.1.58, via projectm-sys) only
          # knows the "Visual Studio 17 2022" generator, but windows-latest now
          # ships VS 18 — so the sidecar's CMake configure fails to find VS.
          # windows-2022 has the matching toolchain (same pin as ci.yml).
          - platform: windows-2022
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libasound2-dev \
            build-essential \
            file

      # The visualizer sidecar (built by beforeBuildCommand → build-sidecar.mjs)
      # compiles libprojectM, whose Windows CMake requires GLEW (find_package(GLEW
      # REQUIRED)). Without it the sidecar build fails and no installer is produced.
      # Same static-md triplet as ci.yml's milkdrop job so it links into the DLL.
      - name: Install Windows build dependencies (GLEW for libprojectM)
        if: matrix.platform == 'windows-2022'
        run: vcpkg --triplet=x64-windows-static-md install glew

      - name: Setup pnpm
        # Version comes from the "packageManager" field in package.json.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          # The Cargo workspace (and its target dir) is at the repo root.
          workspaces: ". -> target"
          key: ${{ matrix.platform }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app + bundle installers
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (optional — add as repo secrets to
          # produce a Gatekeeper-friendly DMG; otherwise the build is unsigned).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # On a tag push: create/append a draft release named after the tag.
          # On manual runs: tagName is empty, so no release is created.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "HypeMuzik ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hypemuzik-${{ matrix.platform }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.app
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/*/release/bundle/**/*.dmg
            target/*/release/bundle/**/*.app
            target/*/release/bundle/**/*.deb
            target/*/release/bundle/**/*.rpm
            target/*/release/bundle/**/*.AppImage
            target/*/release/bundle/**/*.msi
            target/*/release/bundle/**/*.exe

  # Tauri's bundler has no Snap target, so build one separately by repackaging
  # the Linux .deb the build job produced (no recompile) via snapcraft, then
  # attach the .snap to the release. Manual (workflow_dispatch) runs still get a
  # downloadable .snap artifact even though there's no release to attach to.
  snap:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download the Linux build artifacts (.deb)
        uses: actions/download-artifact@v4
        with:
          name: hypemuzik-ubuntu-22.04
          path: linux-build

      - name: Stage the .deb and stamp the snap version
        run: |
          deb="$(find linux-build -name '*.deb' | head -1)"
          if [ -z "$deb" ]; then
            echo "::error::no .deb found in the Linux build artifacts"
            exit 1
          fi
          cp "$deb" app.deb
          ver="$(jq -r .version src-tauri/tauri.conf.json)"
          sed -i "s/^version:.*/version: '$ver'/" snap/snapcraft.yaml
          echo "Building snap $ver from $(basename "$deb")"

      - name: Build the snap
        id: snap
        uses: snapcore/action-build@v1

      - name: Upload the .snap as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hypemuzik-snap
          if-no-files-found: error
          retention-days: 14
          path: ${{ steps.snap.outputs.snap }}

      - name: Attach the .snap to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: ${{ steps.snap.outputs.snap }}
